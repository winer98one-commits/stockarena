workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic test

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa